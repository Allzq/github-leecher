name: انتقال فایل به گیت هاب (با پشتیبانی از Steam Workshop – پایدار)

on:
  workflow_dispatch:
    [ ... keep same inputs ... ]

permissions:
  contents: write

concurrency:
  group: sci-hub-queue
  cancel-in-progress: false
  queue: max

jobs:
  leech-split-file:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Clean old archives
        if: ${{ github.event.inputs.delete_old_archives == 'true' }}
        run: |
          echo "Cleaning old archives..."
          find . -maxdepth 1 -type f \( -name "*.7z.*" -o -name "*.7z" \) -exec rm -v {} \;
          find . -maxdepth 1 -type d -name "downloads" -exec rm -rf {} \;
          git rm --cached *.7z.* 2>/dev/null || true
          git rm --cached *.7z 2>/dev/null || true
          git rm --cached -r downloads 2>/dev/null || true
          echo "Old archives cleaned."

      - name: Parse inputs
        id: parse
        run: |
          SIZE=$(echo "${{ github.event.inputs.split_size }}" | grep -oP '\d+')
          echo "split_mb=${SIZE:-95}" >> $GITHUB_OUTPUT
          cat > urls.txt << URLEOF
          ${{ github.event.inputs.file_url_1 }}
          ${{ github.event.inputs.file_url_2 }}
          ${{ github.event.inputs.file_url_3 }}
          ${{ github.event.inputs.file_url_4 }}
          ${{ github.event.inputs.file_url_5 }}
          URLEOF
          sed -i '/^$/d' urls.txt
          sed -i 's/^[ \t]*//;s/[ \t]*$//' urls.txt
          total=$(wc -l < urls.txt)
          echo "url_count=${total}" >> $GITHUB_OUTPUT
          echo "URL count: ${total}"
          cat -n urls.txt

      - name: Install basic tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y p7zip-full lib32gcc-s1 curl

      - name: Install steamcmd (official method with retry)
        run: |
          curl -sqL "https://steamcdn-a.akamaihd.net/client/installer/steamcmd_linux.tar.gz" -o /tmp/steamcmd.tar.gz
          sudo mkdir -p /usr/local/steamcmd
          sudo tar -xzf /tmp/steamcmd.tar.gz -C /usr/local/steamcmd
          sudo chmod +x /usr/local/steamcmd/steamcmd.sh
          sudo chmod +x /usr/local/steamcmd/linux32/steamcmd
          sudo chmod +x /usr/local/steamcmd/linux32/steamerrorreporter 2>/dev/null || true
          sudo chmod +x /usr/local/steamcmd/linux32/crashhandler.so 2>/dev/null || true
          echo "/usr/local/steamcmd" >> $GITHUB_PATH

          # Retry self-update (known flaky download)
          for i in {1..5}; do
            echo "Attempt $i: running steamcmd to update itself..."
            if /usr/local/steamcmd/steamcmd.sh +quit; then
              echo "SteamCMD update succeeded on attempt $i."
              break
            else
              if [ $i -eq 5 ]; then
                echo "SteamCMD failed to update after 5 attempts."
                exit 1
              fi
              echo "Attempt $i failed, waiting 10 seconds..."
              sleep 10
            fi
          done

      - name: Download all files (supports Workshop & direct URLs)
        id: download_files
        run: |
          mkdir -p files
          total=${{ steps.parse.outputs.url_count }}
          counter=1
          success=0
          APPID="${{ github.event.inputs.steam_appid }}"

          download_workshop() {
            local url="$1"
            local mod_id
            mod_id=$(echo "$url" | grep -oP '(?<=id=)[0-9]+')
            if [ -z "$mod_id" ]; then
              echo "❌ Could not extract Workshop ID from: $url"
              return 1
            fi
            if [ -z "$APPID" ]; then
              echo "❌ Steam App ID not provided. Cannot download workshop item."
              return 1
            fi
            echo "📥 Downloading Workshop mod $mod_id (AppID: $APPID) ..."
            mkdir -p workshop_temp
            cd workshop_temp
            # Retry the actual download as well (workshop downloads can also fail)
            DL_RETRY=3
            for attempt in $(seq 1 $DL_RETRY); do
              if /usr/local/steamcmd/steamcmd.sh +force_install_dir ./ +login anonymous +workshop_download_item "$APPID" "$mod_id" +quit; then
                break
              else
                if [ $attempt -eq $DL_RETRY ]; then
                  cd ..
                  echo "❌ SteamCMD download failed for $mod_id after $DL_RETRY attempts"
                  return 1
                fi
                echo "Download attempt $attempt failed, retrying in 10s..."
                sleep 10
              fi
            done
            # Locate downloaded content
            CONTENT_PATH=""
            if [ -d "steamapps/workshop/content/$APPID/$mod_id" ]; then
              CONTENT_PATH="steamapps/workshop/content/$APPID/$mod_id"
            elif [ -d "workshop/content/$APPID/$mod_id" ]; then
              CONTENT_PATH="workshop/content/$APPID/$mod_id"
            else
              CONTENT_PATH=$(find . -type d -name "$mod_id" | grep -v "^\./steamapps" | head -1)
            fi
            if [ -z "$CONTENT_PATH" ] || [ ! -d "$CONTENT_PATH" ]; then
              cd ..
              echo "❌ Could not locate downloaded workshop content"
              return 1
            fi
            MOD_NAME=$(basename "$CONTENT_PATH")
            if [[ "$MOD_NAME" =~ ^[0-9]+$ ]]; then
              if [ -f "$CONTENT_PATH/description.txt" ]; then
                MOD_NAME=$(head -1 "$CONTENT_PATH/description.txt" | sed 's/[^a-zA-Z0-9._-]/_/g')
              else
                MOD_NAME="workshop_${mod_id}"
              fi
            fi
            cd ..
            mkdir -p "files/$MOD_NAME"
            cp -r "workshop_temp/$CONTENT_PATH"/* "files/$MOD_NAME/" 2>/dev/null || cp -r "workshop_temp/$CONTENT_PATH" "files/$MOD_NAME"
            rm -rf workshop_temp
            echo "✅ Workshop download: $MOD_NAME"
            echo "$MOD_NAME"
            return 0
          }

          while IFS= read -r url; do
            echo "========================================="
            echo "[$counter/$total] Processing: $url"
            if [[ "$url" == *"steamcommunity.com/sharedfiles/filedetails"* ]]; then
              echo "🎮 Workshop link detected."
              MOD_NAME=$(download_workshop "$url")
              if [ $? -eq 0 ] && [ -d "files/$MOD_NAME" ]; then
                success=$((success + 1))
              else
                echo "❌ Workshop download failed for $url"
              fi
            else
              # Direct URL download (unchanged)
              FILENAME_FROM_URL=$(echo "$url" | sed 's/?.*//' | xargs basename)
              if [ -z "$FILENAME_FROM_URL" ]; then
                FILENAME_FROM_URL="unknown_${counter}"
              fi
              FILENAME_BASE="${FILENAME_FROM_URL%.*}"
              FILENAME_EXT="${FILENAME_FROM_URL##*.}"
              if [ "$FILENAME_BASE" = "$FILENAME_FROM_URL" ]; then
                FILENAME_EXT=""
              fi
              PREFIX="sci-hub.ir"
              if [ "$total" -gt 1 ]; then
                NUM=$(printf '%02d' $counter)
                DL_NAME="${PREFIX}_${NUM}_${FILENAME_BASE}"
              else
                DL_NAME="${PREFIX}_${FILENAME_BASE}"
              fi
              MAXLEN=50
              if [ ${#DL_NAME} -gt $MAXLEN ]; then
                DL_NAME="${DL_NAME:0:$MAXLEN}"
              fi
              if [ -n "$FILENAME_EXT" ]; then
                FINAL_FILENAME="${DL_NAME}.${FILENAME_EXT}"
              else
                FINAL_FILENAME="${DL_NAME}"
              fi
              echo "Download filename: ${FINAL_FILENAME}"
              if curl -L --fail --retry 5 --retry-delay 10 --connect-timeout 30 -o "files/${FINAL_FILENAME}" "$url"; then
                size=$(ls -lh "files/${FINAL_FILENAME}" | awk '{print $5}')
                echo "✅ Downloaded: ${FINAL_FILENAME} ($size)"
                success=$((success + 1))
              else
                echo "❌ Failed: $url"
              fi
            fi
            counter=$((counter + 1))
          done < urls.txt

          echo "success_count=${success}" >> $GITHUB_OUTPUT
          echo "Downloaded: $success / $total"

      - name: Process and archive each file
        id: process_files
        run: |
          SPLIT_MB=${{ steps.parse.outputs.split_mb }}
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          FOLDER="downloads/${TIMESTAMP}"
          mkdir -p "$FOLDER"
          PASSWORD="${{ github.event.inputs.zip_password }}"
          echo "Output folder: ${FOLDER}"
          echo "Split size: ${SPLIT_MB}MB"
          processed=0
          for file in files/*; do
            [ -f "$file" ] || continue
            processed=$((processed + 1))
            echo "Archiving: $(basename "$file")"
            if [ "${#PASSWORD}" -gt 0 ]; then
              7z a -p"$PASSWORD" -mhe=on -mx=3 -v${SPLIT_MB}m "${FOLDER}/$(basename "$file").7z" "$file"
            else
              7z a -mx=3 -v${SPLIT_MB}m "${FOLDER}/$(basename "$file").7z" "$file"
            fi
            if [ -f "${FOLDER}/$(basename "$file").7z.001" ] && [ ! -f "${FOLDER}/$(basename "$file").7z.002" ]; then
              mv "${FOLDER}/$(basename "$file").7z.001" "${FOLDER}/$(basename "$file").7z"
            fi
          done
          for dir in files/*/; do
            [ -d "$dir" ] || continue
            modname=$(basename "$dir")
            processed=$((processed + 1))
            echo "Archiving workshop mod: $modname"
            if [ "${#PASSWORD}" -gt 0 ]; then
              7z a -p"$PASSWORD" -mhe=on -mx=3 -v${SPLIT_MB}m "${FOLDER}/${modname}.7z" "$dir"
            else
              7z a -mx=3 -v${SPLIT_MB}m "${FOLDER}/${modname}.7z" "$dir"
            fi
            if [ -f "${FOLDER}/${modname}.7z.001" ] && [ ! -f "${FOLDER}/${modname}.7z.002" ]; then
              mv "${FOLDER}/${modname}.7z.001" "${FOLDER}/${modname}.7z"
            fi
          done
          rm -rf files
          echo "processed_count=${processed}" >> $GITHUB_OUTPUT
          echo "folder=${FOLDER}" >> $GITHUB_OUTPUT

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"

      - name: Commit and Push all chunks
        run: |
          FOLDER="${{ steps.process_files.outputs.folder }}"
          git add "${FOLDER}/"*.7z* 2>/dev/null || true
          if ! git diff --staged --quiet; then
            file_count=$(git diff --staged --name-only | wc -l)
            git commit -m "Add ${{ steps.process_files.outputs.processed_count }} item(s) in ${FOLDER} (${file_count} chunks)"
            push_success=false
            max_attempts=15
            for attempt in $(seq 1 $max_attempts); do
              echo "Push attempt $attempt of $max_attempts..."
              git pull --rebase origin main 2>/dev/null || true
              if git push origin main; then
                echo "Push successful on attempt $attempt."
                push_success=true
                break
              else
                echo "Push failed. Retrying in 20 seconds..."
                sleep 20
              fi
            done
            if [ "$push_success" = false ]; then
              echo "Push failed after $max_attempts attempts."
              exit 1
            fi
          else
            echo "No files to commit."
          fi

      - name: Summary
        run: |
          FOLDER="${{ steps.process_files.outputs.folder }}"
          TOTAL_SIZE=$(du -sh "$FOLDER" 2>/dev/null | awk '{print $1}')
          echo ""
          echo "========================================="
          echo "Job completed!"
          echo "Downloaded: ${{ steps.download_files.outputs.success_count }} / ${{ steps.parse.outputs.url_count }}"
          echo "Processed: ${{ steps.process_files.outputs.processed_count }} item(s)"
          echo "Split size: ${{ steps.parse.outputs.split_mb }}MB"
          echo "Folder: $FOLDER"
          echo "Total size: ${TOTAL_SIZE}"
          echo "========================================="
          cat >> $GITHUB_STEP_SUMMARY << EOF
          <div dir="rtl">
          ## 📊 خلاصه اجرا
          | مورد | مقدار |
          |------|-------|
          | دانلود موفق | ${{ steps.download_files.outputs.success_count }} از ${{ steps.parse.outputs.url_count }} |
          | فایل/آیتم پردازش شده | ${{ steps.process_files.outputs.processed_count }} عدد |
          | حداکثر حجم هر تکه | ${{ steps.parse.outputs.split_mb }} مگابایت |
          | حجم کل | ${TOTAL_SIZE} |
          | 📂 پوشه دانلود | [ ${FOLDER}](https://github.com/${{ github.repository }}/tree/main/${FOLDER}) |
          | وضعیت | ✅ موفق |
          > 📌 **توجه:** دانلود از استیم ورکشاپ با `anonymous` انجام می‌شود. برای آیتم‌های خصوصی یا بازی‌های نیازمند مالکیت ممکن است کار نکند.
          ---
          ## تقدیم به همه آن‌هایی که راهی جز عبور ندارند. - [حسین بلنج](https://balanj.ir)
          </div>
          EOF
